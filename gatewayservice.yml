server:
  port: 8882

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # --- CRITICAL CORS SECTION ---
      globalcors:
        add-to-chain-parameter: true
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      # -----------------------------
      routes:
        - id: video-service-route
          uri: lb://VIDEO-SERVICE
          predicates:
            - Path=/api/videos/**
        - id: user-service-route
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/users/**